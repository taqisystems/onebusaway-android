name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Unit Tests & Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 21 (required by AGP 9.x) ────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Reconstruct local.properties from secrets ─────────────────────────
      #
      #  Add the following secrets to your GitHub repository
      #  (Settings → Secrets and variables → Actions → New repository secret):
      #
      #   ONESIGNAL_APP_ID       — OneSignal App ID
      #   GOOGLE_MAPS_API_KEY    — Google Maps API key (Maps SDK for Android)
      #   APP_NAME               — e.g. "Kelantan Bus"
      #   APP_PRIMARY_COLOR      — e.g. "#C62828"
      #   APP_SECONDARY_COLOR    — e.g. "#E53935"
      #   APP_TERTIARY_COLOR     — e.g. "#37474F"
      #
      #  Signing secrets are intentionally omitted — this pipeline only builds
      #  debug APKs. Add STORE_FILE_BASE64, STORE_PASSWORD, KEY_ALIAS, and
      #  KEY_PASSWORD if you later add a release job.
      #
      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          OBA_USER_AGENT=KelantanBus
          APP_NAME=${{ secrets.APP_NAME }}
          APP_PRIMARY_COLOR=${{ secrets.APP_PRIMARY_COLOR }}
          APP_SECONDARY_COLOR=${{ secrets.APP_SECONDARY_COLOR }}
          APP_TERTIARY_COLOR=${{ secrets.APP_TERTIARY_COLOR }}
          EOF

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testKelantanDebugUnitTest --no-daemon

      # ── 7. Upload test results ───────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testKelantanDebugUnitTest/
          retention-days: 14

      # ── 8. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleKelantanDebug --no-daemon

      # ── 9. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-kelantan-debug
          path: app/build/outputs/apk/kelantan/debug/*.apk
          retention-days: 14
