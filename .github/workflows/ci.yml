name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 21 (required by AGP 9.x) ────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Reconstruct local.properties ─────────────────────────────────────
      #
      #  Gradle validates ONESIGNAL_APP_ID and GOOGLE_MAPS_API_KEY at
      #  configuration time, so we supply dummy placeholder strings here.
      #  Unit tests never make real network calls so no actual credentials
      #  are needed. No repository secrets are required for this pipeline.
      #
      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          ONESIGNAL_APP_ID=ci-placeholder
          GOOGLE_MAPS_API_KEY=ci-placeholder
          OBA_USER_AGENT=KelantanBus
          APP_NAME=Kelantan Bus
          APP_PRIMARY_COLOR=#C62828
          APP_SECONDARY_COLOR=#E53935
          APP_TERTIARY_COLOR=#37474F
          EOF

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testKelantanbusDebugUnitTest --no-daemon

      # ── 7. Upload test results ───────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testKelantanbusDebugUnitTest/
          retention-days: 14

